services:
  # Application Laravel via Docker
  - type: web
    name: ecnpri-app
    runtime: docker
    repo: https://github.com/tresorkabis/sale.git
    plan: free
    buildCommand: "composer install && npm install && npm run build"
    startCommand: "php artisan serve --host=0.0.0.0 --port=$PORT"
    healthCheckPath: /
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: ecnpri-db
          property: host
      - key: DB_DATABASE
        fromDatabase:
          name: ecnpri-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: ecnpri-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ecnpri-db
          property: password

  # Worker pour migrations/seeders
  - type: worker
    name: ecnpri-migrate-seed
    runtime: docker
    plan: free
    buildCommand: "composer install"
    startCommand: "php artisan migrate:fresh --seed --seeder=CnpriSeeder --force"
    autoDeploy: false
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: ecnpri-db
          property: host
      - key: DB_DATABASE
        fromDatabase:
          name: ecnpri-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: ecnpri-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ecnpri-db
          property: password

databases:
  - name: ecnpri-db
    databaseName: ecnpri_db
    user: ecnpri_user
    plan: free
