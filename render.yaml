# render.yaml
services:
  # Service pour l'application web Laravel
  - type: web
    name: ecnpri-app
    env: php
    buildCommand: "composer install && npm install && npm run build"
    startCommand: "php artisan serve --host=0.0.0.0 --port=$PORT"
    healthCheckPath: /
    envVars:
      - fromGroup: ecnpri-shared-vars

  # Job pour les migrations et le seeding (exécuté manuellement ou via API)
  - type: job
    name: ecnpri-migrate-seed
    env: php
    plan: free
    buildCommand: "composer install"
    startCommand: "php artisan migrate:fresh --seed --seeder=CnpriSeeder --force"
    envVars:
      - fromGroup: ecnpri-shared-vars

databases:
  - name: ecnpri-db
    databaseName: ecnpri_db
    user: ecnpri_user
    plan: free

envVarGroups:
  - name: ecnpri-shared-vars
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: ecnpri-db
          property: host
      - key: DB_DATABASE
        fromDatabase:
          name: ecnpri-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: ecnpri-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ecnpri-db
          property: password
