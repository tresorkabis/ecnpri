# render.yaml
services:
  # Service pour l'application web Laravel
  - type: web
    name: ecnpri-app
    env: docker # Indique à Render d'utiliser le Dockerfile
    plan: free # Plan gratuit pour la démo
    healthCheckPath: / # Chemin pour vérifier la santé de l'application
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true # Render générera une clé d'application sécurisée
      - key: DB_CONNECTION
        value: sqlite # Utilise SQLite
      - key: DB_DATABASE
        value: /var/www/html/database/database.sqlite # Chemin vers la base de données SQLite

  # Worker pour exécuter les migrations et les seeders (à lancer manuellement après le déploiement initial)
  - type: worker # CHANGED: Remplacé 'job' par 'worker'
    name: ecnpri-migrate-seed
    env: docker # Indique à Render d'utiliser le Dockerfile
    plan: free # Plan gratuit pour le worker
    startCommand: "php artisan migrate:fresh --seed --seeder=CnpriSeeder --force" # Commande de migration et de seeding
    autoDeploy: false # IMPORTANT: Ne pas exécuter automatiquement à chaque déploiement pour éviter de réinitialiser la DB
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /var/www/html/database/database.sqlite
